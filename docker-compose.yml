services:
  postgres:
    image: postgres:16
    container_name: iracing-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iracing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iracing_local}
      POSTGRES_DB: ${POSTGRES_DB:-telemetry}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: iracing-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:alpine
    container_name: iracing-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: iracing-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-iracing}:${POSTGRES_PASSWORD:-iracing_local}@postgres:5432/${POSTGRES_DB:-telemetry}
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: iracing-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata: